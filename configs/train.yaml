# Training hyperparameters for fine-tuning YOLOv8 on VisDrone.
# Small objects dominate aerial imagery, so the input is large (1280) and
# mosaic is closed late to stabilise the final epochs.

model: yolov8s.pt
data: configs/visdrone.yaml

epochs: 100
imgsz: 1280
batch: 16
optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0

# Augmentation tuned for dense small targets.
mosaic: 1.0
close_mosaic: 10
mixup: 0.1
copy_paste: 0.1
scale: 0.5
fliplr: 0.5
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4

patience: 30
project: runs/visdrone
name: yolov8s-1280
