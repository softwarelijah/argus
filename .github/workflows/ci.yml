name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pyyaml opencv-python-headless onnx onnxruntime \
            pytest pytest-cov ruff mypy types-PyYAML
          pip install -e .

      - name: Lint
        run: ruff check argus tests scripts

      - name: Type check
        run: mypy argus

      - name: Test
        run: pytest --cov=argus --cov-report=term-missing

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pyyaml opencv-python-headless
          pip install -e .
      - name: Synthetic tracking smoke test
        run: python scripts/demo_synthetic.py --targets 60 --frames 100
